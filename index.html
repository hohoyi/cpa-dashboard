<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPA 学习仪表盘</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg-primary: #0a0f1a;
  --bg-secondary: #111827;
  --bg-card: #1a2236;
  --bg-card-hover: #1f2a42;
  --border: #2a3550;
  --text-primary: #e8edf5;
  --text-secondary: #8892a8;
  --text-muted: #5a6478;
  --accent-gold: #f0b429;
  --accent-gold-dim: rgba(240,180,41,0.15);
  --accent-blue: #3b82f6;
  --accent-blue-dim: rgba(59,130,246,0.15);
  --accent-green: #10b981;
  --accent-green-dim: rgba(16,185,129,0.15);
  --accent-red: #ef4444;
  --accent-red-dim: rgba(239,68,68,0.15);
  --accent-purple: #8b5cf6;
  --accent-purple-dim: rgba(139,92,246,0.15);
  --accent-orange: #f97316;
  --accent-orange-dim: rgba(249,115,22,0.15);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(240,180,41,0.04) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 50%, rgba(139,92,246,0.03) 0%, transparent 60%);
  z-index: 0;
  animation: bgShift 20s ease-in-out infinite alternate;
}

@keyframes bgShift {
  0% { transform: translate(0,0) rotate(0deg); }
  100% { transform: translate(-2%,-2%) rotate(3deg); }
}

.app-container {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}

.header-left h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--accent-gold), #fbbf24, var(--accent-gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-left p {
  color: var(--text-secondary);
  font-size: 13px;
  margin-top: 4px;
  font-weight: 300;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.streak-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--accent-gold-dim);
  border: 1px solid rgba(240,180,41,0.3);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
}

.streak-badge .fire { font-size: 20px; }
.streak-badge .num {
  color: var(--accent-gold);
  font-weight: 700;
  font-size: 18px;
}

.date-display {
  color: var(--text-secondary);
  font-size: 13px;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.stat-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
}

.stat-card:nth-child(1)::after { background: var(--accent-gold); }
.stat-card:nth-child(2)::after { background: var(--accent-blue); }
.stat-card:nth-child(3)::after { background: var(--accent-green); }
.stat-card:nth-child(4)::after { background: var(--accent-purple); }

.stat-card:hover {
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.stat-value {
  font-family: 'Noto Serif SC', serif;
  font-size: 32px;
  font-weight: 900;
}

.stat-card:nth-child(1) .stat-value { color: var(--accent-gold); }
.stat-card:nth-child(2) .stat-value { color: var(--accent-blue); }
.stat-card:nth-child(3) .stat-value { color: var(--accent-green); }
.stat-card:nth-child(4) .stat-value { color: var(--accent-purple); }

.stat-sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 32px;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.card-header h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-header h2 .icon { font-size: 20px; }

.card-body { padding: 20px; }

.checkin-area {
  text-align: center;
  padding: 20px;
}

.checkin-btn {
  background: linear-gradient(135deg, var(--accent-gold), #f59e0b);
  color: #000;
  border: none;
  padding: 14px 48px;
  border-radius: 30px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Noto Sans SC', sans-serif;
  letter-spacing: 2px;
}

.checkin-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 32px rgba(240,180,41,0.3);
}

.checkin-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.checkin-btn.checked {
  background: var(--accent-green);
  color: #fff;
}

.week-dots {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 20px;
}

.week-dot {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-muted);
  transition: all 0.3s ease;
}

.week-dot.active {
  border-color: var(--accent-gold);
  background: var(--accent-gold-dim);
  color: var(--accent-gold);
  font-weight: 700;
}

.week-dot.checked {
  border-color: var(--accent-green);
  background: var(--accent-green);
  color: #fff;
}

.checkin-msg {
  margin-top: 12px;
  font-size: 13px;
  color: var(--text-secondary);
}

.timer-section {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.timer-display {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--accent-gold);
  min-width: 80px;
}

.timer-btn {
  padding: 6px 16px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
}

.timer-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }
.timer-btn.active { background: var(--accent-gold-dim); border-color: var(--accent-gold); color: var(--accent-gold); }

.km-subjects {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.km-subject {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: all 0.3s ease;
}

.km-subject:hover {
  border-color: var(--accent-blue);
}

.km-subject-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  background: rgba(255,255,255,0.02);
  transition: background 0.2s;
}

.km-subject-header:hover {
  background: rgba(255,255,255,0.04);
}

.km-subject-name {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
  font-size: 14px;
}

.km-subject-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}

.km-progress-bar {
  width: 120px;
  height: 6px;
  background: var(--bg-primary);
  border-radius: 3px;
  overflow: hidden;
}

.km-progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

.km-pct {
  font-size: 12px;
  color: var(--text-secondary);
  min-width: 36px;
  text-align: right;
}

.km-chapters {
  display: none;
  padding: 8px 16px 12px;
  border-top: 1px solid var(--border);
}

.km-chapters.open { display: block; }

.km-chapter {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.km-chapter:last-child { border-bottom: none; }

.km-chapter-name {
  font-size: 13px;
  color: var(--text-secondary);
}

.km-status-btns {
  display: flex;
  gap: 4px;
}

.km-status-btn {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  color: var(--text-muted);
}

.km-status-btn:hover { border-color: var(--accent-blue); }
.km-status-btn.active-learn { background: var(--accent-blue-dim); border-color: var(--accent-blue); color: var(--accent-blue); }
.km-status-btn.active-done { background: var(--accent-green-dim); border-color: var(--accent-green); color: var(--accent-green); }

.quiz-container { min-height: 300px; }

.quiz-question {
  font-size: 15px;
  line-height: 1.8;
  margin-bottom: 20px;
  padding: 16px;
  background: rgba(255,255,255,0.02);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent-blue);
}

.quiz-options { display: flex; flex-direction: column; gap: 8px; }

.quiz-option {
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  background: transparent;
  color: var(--text-primary);
  text-align: left;
  font-family: 'Noto Sans SC', sans-serif;
}

.quiz-option:hover {
  border-color: var(--accent-blue);
  background: var(--accent-blue-dim);
}

.quiz-option.correct {
  border-color: var(--accent-green);
  background: var(--accent-green-dim);
  color: var(--accent-green);
}

.quiz-option.wrong {
  border-color: var(--accent-red);
  background: var(--accent-red-dim);
  color: var(--accent-red);
}

.quiz-explanation {
  margin-top: 16px;
  padding: 16px;
  background: var(--accent-blue-dim);
  border-radius: var(--radius-sm);
  font-size: 13px;
  line-height: 1.8;
  color: var(--text-secondary);
  display: none;
}

.quiz-explanation.show { display: block; }

.quiz-explanation strong { color: var(--accent-blue); }

.quiz-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
}

.quiz-score {
  font-size: 13px;
  color: var(--text-secondary);
}

.quiz-next-btn {
  background: var(--accent-blue);
  color: #fff;
  border: none;
  padding: 8px 24px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
}

.quiz-next-btn:hover { opacity: 0.85; }

.notebook-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}

.notebook-input, .notebook-textarea {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'Noto Sans SC', sans-serif;
  transition: border-color 0.2s;
  outline: none;
}

.notebook-input:focus, .notebook-textarea:focus {
  border-color: var(--accent-purple);
}

.notebook-textarea {
  min-height: 80px;
  resize: vertical;
}

.notebook-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.notebook-tag {
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
}

.notebook-tag:hover, .notebook-tag.active {
  border-color: var(--accent-purple);
  background: var(--accent-purple-dim);
  color: var(--accent-purple);
}

.notebook-submit {
  background: var(--accent-purple);
  color: #fff;
  border: none;
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
  align-self: flex-end;
}

.notebook-submit:hover { opacity: 0.85; }

.notebook-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 400px;
  overflow-y: auto;
}

.notebook-list::-webkit-scrollbar { width: 4px; }
.notebook-list::-webkit-scrollbar-track { background: transparent; }
.notebook-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.note-item {
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.01);
  transition: all 0.2s;
}

.note-item:hover { background: rgba(255,255,255,0.03); }

.note-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.note-item-title {
  font-weight: 500;
  font-size: 14px;
}

.note-item-date {
  font-size: 11px;
  color: var(--text-muted);
}

.note-item-body {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 6px;
}

.note-item-tags {
  display: flex;
  gap: 4px;
}

.note-item-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 8px;
  background: var(--accent-purple-dim);
  color: var(--accent-purple);
}

.note-item-delete {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all 0.2s;
}

.note-item-delete:hover {
  color: var(--accent-red);
  background: var(--accent-red-dim);
}

.full-width {
  grid-column: 1 / -1;
}

@media (max-width: 900px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .main-grid { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: flex-start; gap: 12px; }
}

@media (max-width: 600px) {
  .stats-row { grid-template-columns: 1fr; }
  .app-container { padding: 12px; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in { animation: fadeIn 0.4s ease forwards; }

.toast {
  position: fixed;
  top: 24px;
  right: 24px;
  padding: 14px 24px;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 14px;
  z-index: 1000;
  transform: translateX(120%);
  transition: transform 0.3s ease;
  box-shadow: var(--shadow);
}

.toast.show { transform: translateX(0); }
.toast.success { background: var(--accent-green); }
.toast.info { background: var(--accent-blue); }

.export-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
}

.export-btn:hover {
  border-color: var(--accent-gold);
  color: var(--accent-gold);
}
</style>
</head>
<body>

<div class="app-container">
  <header class="header">
    <div class="header-left">
      <h1>CPA 学习仪表盘</h1>
      <p>地方AMC · 证券IT老兵 · 会计零基础 → CPA持证人</p>
    </div>
    <div class="header-right">
      <div class="streak-badge">
        <span class="fire">🔥</span>
        <span>连续</span>
        <span class="num" id="streakNum">0</span>
        <span>天</span>
      </div>
      <div class="date-display" id="dateDisplay"></div>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card fade-in">
      <div class="stat-label">累计学习</div>
      <div class="stat-value" id="totalHours">0</div>
      <div class="stat-sub">小时</div>
    </div>
    <div class="stat-card fade-in" style="animation-delay:0.1s">
      <div class="stat-label">答题正确率</div>
      <div class="stat-value" id="accuracy">0%</div>
      <div class="stat-sub" id="quizCount">共 0 题</div>
    </div>
    <div class="stat-card fade-in" style="animation-delay:0.2s">
      <div class="stat-label">知识点覆盖</div>
      <div class="stat-value" id="knowledgePct">0%</div>
      <div class="stat-sub" id="knowledgeCount">0 / 0 个</div>
    </div>
    <div class="stat-card fade-in" style="animation-delay:0.3s">
      <div class="stat-label">业务笔记</div>
      <div class="stat-value" id="noteCount">0</div>
      <div class="stat-sub">条记录</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="card fade-in">
      <div class="card-header">
        <h2><span class="icon">📅</span> 每日打卡</h2>
      </div>
      <div class="card-body">
        <div class="checkin-area">
          <button class="checkin-btn" id="checkinBtn" onclick="doCheckin()">今日打卡</button>
          <div class="week-dots" id="weekDots"></div>
          <div class="checkin-msg" id="checkinMsg"></div>
        </div>
        <div class="timer-section">
          <div class="timer-display" id="timerDisplay">00:00</div>
          <button class="timer-btn" id="timerStartBtn" onclick="toggleTimer()">开始计时</button>
          <button class="timer-btn" onclick="resetTimer()">重置</button>
        </div>
      </div>
    </div>

    <div class="card fade-in" style="animation-delay:0.1s">
      <div class="card-header">
        <h2><span class="icon">⚡</span> 每日快问快答</h2>
        <button class="export-btn" onclick="loadNewQuiz()">换一题</button>
      </div>
      <div class="card-body">
        <div class="quiz-container" id="quizContainer"></div>
      </div>
    </div>

    <div class="card full-width fade-in" style="animation-delay:0.2s">
      <div class="card-header">
        <h2><span class="icon">🗺️</span> 知识地图</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <span style="font-size:11px;color:var(--text-muted)">📖 学习中</span>
          <span style="font-size:11px;color:var(--text-muted)">✅ 已掌握</span>
        </div>
      </div>
      <div class="card-body">
        <div class="km-subjects" id="kmSubjects"></div>
      </div>
    </div>

    <div class="card full-width fade-in" style="animation-delay:0.3s">
      <div class="card-header">
        <h2><span class="icon">📓</span> 业务问题笔记本</h2>
        <button class="export-btn" onclick="exportNotes()">导出笔记</button>
      </div>
      <div class="card-body">
        <div class="notebook-form">
          <input class="notebook-input" id="noteTitle" placeholder="问题标题（如：融资租赁为什么不能出表？）">
          <textarea class="notebook-textarea" id="noteBody" placeholder="详细描述你的问题或学习心得..."></textarea>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div class="notebook-tags" id="noteTags">
              <button class="notebook-tag" data-tag="会计" onclick="toggleNoteTag(this)">会计</button>
              <button class="notebook-tag" data-tag="不良资产" onclick="toggleNoteTag(this)">不良资产</button>

<div class="toast" id="toast"></div>

<script>
// ============ DATA STORE ============
const STORAGE_KEY = 'cpa_dashboard_v1';

var defaultData = {
  checkins: [],
  streak: 0,
  totalMinutes: 0,
  quizStats: { total: 0, correct: 0 },
  knowledgeStatus: {},
  notes: [],
  timerRunning: false,
  timerStart: null,
  timerAccumulated: 0
};

var appData = loadData();

function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      var result = {};
      for (var k in defaultData) { result[k] = defaultData[k]; }
      for (var k in parsed) { result[k] = parsed[k]; }
      return result;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(defaultData));
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
}

// ============ DATE HELPERS ============
function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function formatDate(d) {
  var date = new Date(d);
  return (date.getMonth()+1) + '月' + date.getDate() + '日';
}

// ============ TOAST ============
function showToast(msg, type) {
  type = type || 'success';
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ============ HEADER DATE ============
function updateDate() {
  var now = new Date();
  var days = ['日','一','二','三','四','五','六'];
  document.getElementById('dateDisplay').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 周' + days[now.getDay()];
}

// ============ CHECKIN ============
function renderCheckin() {
  var today = todayStr();
  var checked = appData.checkins.indexOf(today) !== -1;
  var btn = document.getElementById('checkinBtn');

  if (checked) {
    btn.textContent = '✓ 已打卡';
    btn.disabled = true;
    btn.classList.add('checked');
  } else {
    btn.textContent = '今日打卡';
    btn.disabled = false;
    btn.classList.remove('checked');
  }

  document.getElementById('streakNum').textContent = appData.streak;

  var weekDots = document.getElementById('weekDots');
  var dayLabels = ['一','二','三','四','五','六','日'];
  var now = new Date();
  var dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
  var html = '';
  for (var i = 0; i < 7; i++) {
    var d = new Date(now);
    d.setDate(d.getDate() - dayOfWeek + i);
    var ds = d.toISOString().split('T')[0];
    var isChecked = appData.checkins.indexOf(ds) !== -1;
    var isToday = ds === today;
    var cls = 'week-dot';
    if (isChecked) cls += ' checked';
    if (isToday) cls += ' active';
    html += '<div class="' + cls + '">' + dayLabels[i] + '</div>';
  }
  weekDots.innerHTML = html;

  var msg = document.getElementById('checkinMsg');
  if (checked) {
    var encouragements = ['太棒了，坚持就是胜利！','今天的你比昨天更强！','CPA在向你招手！','优秀是一种习惯！'];
    msg.textContent = encouragements[Math.floor(Math.random()*encouragements.length)];
  } else {
    msg.textContent = '今天还没打卡哦，开始学习吧！';
  }
}

function doCheckin() {
  var today = todayStr();
  if (appData.checkins.indexOf(today) !== -1) return;

  appData.checkins.push(today);

  var streak = 1;
  var d = new Date();
  d.setDate(d.getDate() - 1);
  while (true) {
    var ds = d.toISOString().split('T')[0];
    if (appData.checkins.indexOf(ds) !== -1) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  appData.streak = streak;
  saveData();
  renderCheckin();
  updateStats();
  showToast('打卡成功！连续 ' + streak + ' 天 🔥');
}

// ============ TIMER ============
var timerInterval = null;

function toggleTimer() {
  if (appData.timerRunning) {
    clearInterval(timerInterval);
    var elapsed = Math.floor((Date.now() - appData.timerStart) / 60000);
    appData.totalMinutes += elapsed;
    appData.timerAccumulated += elapsed * 60;
    appData.timerRunning = false;
    appData.timerStart = null;
    saveData();
    document.getElementById('timerStartBtn').textContent = '开始计时';
    document.getElementById('timerStartBtn').classList.remove('active');
    updateStats();
    showToast('本次学习 ' + elapsed + ' 分钟，累计 ' + appData.totalMinutes + ' 分钟');
  } else {
    appData.timerRunning = true;
    appData.timerStart = Date.now();
    saveData();
    document.getElementById('timerStartBtn').textContent = '停止计时';
    document.getElementById('timerStartBtn').classList.add('active');
    timerInterval = setInterval(updateTimerDisplay, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  if (appData.timerRunning && appData.timerStart) {
    var elapsed = Math.floor((Date.now() - appData.timerStart) / 60000);
    appData.totalMinutes += elapsed;
  }
  appData.timerRunning = false;
  appData.timerStart = null;
  appData.timerAccumulated = 0;
  saveData();
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('timerStartBtn').textContent = '开始计时';
  document.getElementById('timerStartBtn').classList.remove('active');
  updateStats();
}

function updateTimerDisplay() {
  var totalSec = appData.timerAccumulated;
  if (appData.timerRunning && appData.timerStart) {
    totalSec += Math.floor((Date.now() - appData.timerStart) / 1000);
  }
  var m = Math.floor(totalSec / 60);
  var s = totalSec % 60;
  var display = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  document.getElementById('timerDisplay').textContent = display;
}

if (appData.timerRunning && appData.timerStart) {
  timerInterval = setInterval(updateTimerDisplay, 1000);
  document.getElementById('timerStartBtn').textContent = '停止计时';
  document.getElementById('timerStartBtn').classList.add('active');
}

    optionsHtml += '<button class="quiz-option" onclick="answerQuiz(' + i + ')" id="opt' + i + '"><strong>' + 'ABCD'[i] + '.</strong> ' + q.options[i] + '</button>';
  }
  container.innerHTML = '<div style="margin-bottom:8px;">' +
    '<span style="font-size:11px;padding:3px 10px;border-radius:10px;background:var(--accent-blue-dim);color:var(--accent-blue);">' + q.subject + '</span>' +
    '<span style="font-size:11px;padding:3px 10px;border-radius:10px;background:var(--accent-gold-dim);color:var(--accent-gold);margin-left:4px;">' + q.topic + '</span></div>' +

    '<div class="quiz-options">' + optionsHtml + '</div>' +

    '<button class="quiz-next-btn" onclick="loadNewQuiz()">下一题 →</button></div>';
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;

  var q = currentQuiz;
  appData.quizStats.total++;

  var optEl = document.getElementById('opt' + idx);
  optEl.classList.add(idx === q.answer ? 'correct' : 'wrong');
  if (idx !== q.answer) {
    document.getElementById('opt' + q.answer).classList.add('correct');
  } else {
    appData.quizStats.correct++;
  }

  document.getElementById('quizExplanation').classList.add('show');
  document.getElementById('quizScoreDisplay').textContent = '正确 ' + appData.quizStats.correct + ' / ' + appData.quizStats.total;

  saveData();
  updateStats();
}

function renderKnowledgeMap() {
  var container = document.getElementById('kmSubjects');
  var totalChapters = 0;
  var learnedChapters = 0;

  var html = '';
  for (var si = 0; si < kmData.length; si++) {
    var subject = kmData[si];
    var subjectKey = 's' + si;
    var done = 0, learning = 0;
    for (var ci = 0; ci < subject.chapters.length; ci++) {
      var key = subjectKey + '_c' + ci;
      var status = appData.knowledgeStatus[key];
      if (status === 'done') done++;
      else if (status === 'learning') learning++;
    }
    totalChapters += subject.chapters.length;
    learnedChapters += done;

    var pct = Math.round(((done + learning * 0.5) / subject.chapters.length) * 100);

    html += '<div class="km-subject">' +
      '<div class="km-subject-header" onclick="toggleChapters(\'chapters_' + si + '\')">' +
        '<div class="km-subject-name">' +
          '<div class="km-subject-dot" style="background:' + subject.color + '"></div>' +
          subject.name +
          '<span style="font-size:12px;color:var(--text-muted)">' + done + '/' + subject.chapters.length + '</span>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:10px;">' +
          '<div class="km-progress-bar"><div class="km-progress-fill" style="width:' + pct + '%;background:' + subject.color + '"></div></div>' +
          '<span class="km-pct">' + pct + '%</span>' +
        '</div>' +
      '</div>' +
      '<div class="km-chapters" id="chapters_' + si + '">';

    for (var ci = 0; ci < subject.chapters.length; ci++) {
      var key = subjectKey + '_c' + ci;
      var status = appData.knowledgeStatus[key] || '';
      html += '<div class="km-chapter">' +
        '<span class="km-chapter-name">' + subject.chapters[ci] + '</span>' +
        '<div class="km-status-btns">' +
          '<button class="km-status-btn ' + (status==='learning'?'active-learn':'') + '" onclick="setKnowledgeStatus(\'' + key + '\',\'learning\',this)" title="学习中">📖</button>' +
          '<button class="km-status-btn ' + (status==='done'?'active-done':'') + '" onclick="setKnowledgeStatus(\'' + key + '\',\'done\',this)" title="已掌握">✅</button>' +
        '</div></div>';
    }

    html += '</div></div>';
  }

  container.innerHTML = html;

  var pct = totalChapters > 0 ? Math.round((learnedChapters / totalChapters) * 100) : 0;
  document.getElementById('knowledgePct').textContent = pct + '%';
  document.getElementById('knowledgeCount').textContent = learnedChapters + ' / ' + totalChapters + ' 个';
}

function toggleChapters(id) {
  document.getElementById(id).classList.toggle('open');
}

function setKnowledgeStatus(key, status, btn) {
  if (appData.knowledgeStatus[key] === status) {
    delete appData.knowledgeStatus[key];
  } else {
    appData.knowledgeStatus[key] = status;
  }
  saveData();
  renderKnowledgeMap();
  updateStats();
}

// ============ NOTEBOOK ============
function toggleNoteTag(btn) {
  btn.classList.toggle('active');
}

function addNote() {
  var title = document.getElementById('noteTitle').value.trim();
  var body = document.getElementById('noteBody').value.trim();
  var tags = [];
  var activeTags = document.querySelectorAll('.notebook-tag.active');
  for (var i = 0; i < activeTags.length; i++) {
    tags.push(activeTags[i].dataset.tag);
  }

  if (!title) { showToast('请输入问题标题', 'info'); return; }
  if (!body) { showToast('请输入详细描述', 'info'); return; }

  appData.notes.unshift({
    id: Date.now(),
    title: title,
    body: body,
    tags: tags,
    date: todayStr()
  });

  saveData();
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteBody').value = '';
  var activeTags = document.querySelectorAll('.notebook-tag.active');
  for (var i = 0; i < activeTags.length; i++) {
    activeTags[i].classList.remove('active');
  }
  renderNotes();
  updateStats();
  showToast('笔记已保存 📝');
}

function deleteNote(id) {
  appData.notes = appData.notes.filter(function(n) { return n.id !== id; });
  saveData();
  renderNotes();
  updateStats();
}

function renderNotes() {
  var list = document.getElementById('notebookList');
  if (appData.notes.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:32px;font-size:13px;">还没有笔记，记录你的第一个业务问题吧！</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < appData.notes.length; i++) {
    var n = appData.notes[i];
    var tagsHtml = '';
    if (n.tags.length) {
      tagsHtml = '<div class="note-item-tags">';
      for (var j = 0; j < n.tags.length; j++) {
        tagsHtml += '<span class="note-item-tag">' + n.tags[j] + '</span>';
      }
      tagsHtml += '</div>';
    }
    html += '<div class="note-item">' +
      '<div class="note-item-header">' +
        '<span class="note-item-title">' + n.title + '</span>' +
        '<div style="display:flex;align-items:center;gap:8px;">' +
          '<span class="note-item-date">' + formatDate(n.date) + '</span>' +
          '<button class="note-item-delete" onclick="deleteNote(' + n.id + ')" title="删除">✕</button>' +
        '</div>' +
      '</div>' +
      '<div class="note-item-body">' + n.body + '</div>' +
      tagsHtml +
    '</div>';
  }
  list.innerHTML = html;
}

function exportNotes() {
  if (appData.notes.length === 0) {
    showToast('没有笔记可导出', 'info');
    return;
  }
  var text = 'CPA学习笔记 - 导出时间: ' + new Date().toLocaleString() + '\n\n';
  for (var i = 0; i < 20; i++) text += '=';
  text += '\n\n';
  for (var i = 0; i < appData.notes.length; i++) {
    var n = appData.notes[i];
    text += '【' + (i+1) + '】' + n.title + '\n';
    text += '日期: ' + formatDate(n.date) + '\n';
    if (n.tags.length) text += '标签: ' + n.tags.join(', ') + '\n';
    text += '\n' + n.body + '\n\n';
    for (var j = 0; j < 40; j++) text += '-';
    text += '\n\n';
  }

  var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'CPA学习笔记_' + todayStr() + '.txt';
  a.click();
  URL.revokeObjectURL(url);
  showToast('笔记已导出 📄');
}

// ============ STATS UPDATE ============
function updateStats() {
  var hours = (appData.totalMinutes / 60).toFixed(1);
  document.getElementById('totalHours').textContent = hours;

  var total = appData.quizStats.total;
  var correct = appData.quizStats.correct;
  var acc = total > 0 ? Math.round((correct / total) * 100) : 0;
  document.getElementById('accuracy').textContent = acc + '%';
  document.getElementById('quizCount').textContent = '共 ' + total + ' 题';

  document.getElementById('noteCount').textContent = appData.notes.length;
}

  updateDate();
  renderCheckin();
  updateTimerDisplay();
  loadNewQuiz();
  renderKnowledgeMap();
  renderNotes();
  updateStats();
}
