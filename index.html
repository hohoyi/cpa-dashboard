<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CPA 学习</title>
<style>
:root {
  --bg: #0a0f1a;
  --bg2: #111827;
  --card: #1a2236;
  --border: #2a3550;
  --text: #e8edf5;
  --text2: #8892a8;
  --text3: #5a6478;
  --gold: #f0b429;
  --gold-bg: rgba(240,180,41,0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.12);
  --green: #10b981;
  --green-bg: rgba(16,185,129,0.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.12);
  --purple: #8b5cf6;
  --purple-bg: rgba(139,92,246,0.12);
  --orange: #f97316;
  --orange-bg: rgba(249,115,22,0.12);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --tab-h: 56px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ===== LOGIN ===== */
.login-screen {
  position: fixed;
  inset:0;
  z-index:9999;
  background: var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.login-box {
  width:100%;
  max-width:320px;
  text-align:center;
}
.login-box h1 {
  font-size:32px;
  font-weight:800;
  background: linear-gradient(135deg, var(--gold), #fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing:1px;
  margin-bottom:6px;
}
.login-box .sub {
  color:var(--text2);
  font-size:12px;
  margin-bottom:6px;
  font-weight:300;
}
.login-box .ver {
  display:inline-block;
  font-size:10px;
  padding:2px 10px;
  border-radius:20px;
  background:var(--blue-bg);
  color:var(--blue);
  border:1px solid rgba(59,130,246,0.3);
  margin-bottom:28px;
}
.login-box input {
  width:100%;
  padding:16px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--bg2);
  color:var(--text);
  font-size:17px;
  text-align:center;
  outline:none;
  margin-bottom:14px;
  font-family:inherit;
}
.login-box input:focus { border-color:var(--gold); }
.login-box button {
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,var(--gold),#f59e0b);
  color:#000;
  font-size:17px;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
  letter-spacing:2px;
}

/* ===== MAIN APP ===== */
.app { display:none; height:100%; overflow:hidden; }

/* Header */
.app-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px 8px;
  padding-top:max(12px, env(safe-area-inset-top, 12px));
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.app-header .title {
  font-size:18px;
  font-weight:700;
  background:linear-gradient(135deg,var(--gold),#fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.app-header .ver {
  font-size:9px;
  padding:1px 8px;
  border-radius:10px;
  background:var(--blue-bg);
  color:var(--blue);
  border:1px solid rgba(59,130,246,0.3);
  margin-left:6px;
}
.app-header .right {
  display:flex;
  align-items:center;
  gap:10px;
  font-size:12px;
  color:var(--text2);
}
.app-header .right .user { font-size:13px; }
.app-header .right .logout {
  background:none;
  border:1px solid var(--border);
  color:var(--text3);
  padding:2px 10px;
  border-radius:10px;
  font-size:11px;
  font-family:inherit;
  cursor:pointer;
}

/* ===== PAGE AREA ===== */
.page-area {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling: touch;
  padding:12px 16px 16px;
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 12px);
}

/* ===== BOTTOM TABS ===== */
.tab-bar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--bg2);
  border-top:1px solid var(--border);
  display:flex;
  z-index:100;
}
.tab-btn {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  background:none;
  border:none;
  color:var(--text3);
  font-size:10px;
  font-family:inherit;
  cursor:pointer;
  transition:color 0.2s;
}
.tab-btn .tab-icon { font-size:22px; line-height:1; }
.tab-btn.active { color:var(--gold); }

.page { display:none; }
.page.active { display:block; }

/* ===== HOME PAGE ===== */
.stats-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:16px;
}
.stat-item {
  background:var(--card);
  border-radius:14px;
  padding:16px;
  border:1px solid var(--border);
}
.stat-item .label {
  font-size:11px;
  color:var(--text3);
  letter-spacing:0.5px;
  margin-bottom:4px;
}
.stat-item .value {
  font-size:28px;
  font-weight:800;
  line-height:1.2;
}
.stat-item .sub {
  font-size:11px;
  color:var(--text2);
  margin-top:2px;
}
.stat-item.gold .value { color:var(--gold); }
.stat-item.blue .value { color:var(--blue); }
.stat-item.green .value { color:var(--green); }
.stat-item.purple .value { color:var(--purple); }

/* ===== CHECKIN ===== */
.checkin-section {
  background:var(--card);
  border-radius:14px;
  border:1px solid var(--border);
  padding:20px;
  margin-bottom:12px;
}
.checkin-top {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.checkin-top .streak {
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  color:var(--text2);
}
.checkin-top .streak .num {
  font-size:22px;
  font-weight:700;
  color:var(--gold);
}
.checkin-btn {
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  font-size:16px;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
  background:linear-gradient(135deg,var(--gold),#f59e0b);
  color:#000;
  letter-spacing:2px;
  margin-bottom:14px;
}
.checkin-btn.checked {
  background:var(--green);
  color:#fff;
  opacity:0.7;
}
.week-row {
  display:flex;
  justify-content:space-between;
  gap:6px;
}
.week-dot {
  flex:1;
  aspect-ratio:1;
  border-radius:50%;
  border:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  color:var(--text3);
  font-weight:500;
}
.week-dot.active { border-color:var(--gold); background:var(--gold-bg); color:var(--gold); }
.week-dot.checked { border-color:var(--green); background:var(--green); color:#fff; }

/* ===== TIMER ===== */
.timer-section {
  background:var(--card);
  border-radius:14px;
  border:1px solid var(--border);
  padding:20px;
  text-align:center;
  margin-bottom:12px;
}
.timer-display {
  font-size:48px;
  font-weight:800;
  color:var(--gold);
  font-variant-numeric:tabular-nums;
  letter-spacing:4px;
  margin-bottom:16px;
}
.timer-btns {
  display:flex;
  gap:12px;
  justify-content:center;
}
.timer-btns button {
  padding:12px 32px;
  border-radius:14px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text2);
  font-size:15px;
  font-family:inherit;
  cursor:pointer;
  transition:all 0.2s;
  flex:1;
  max-width:160px;
  font-weight:500;
}
.timer-btns button.start { background:var(--gold); color:#000; border-color:var(--gold); font-weight:700; }
.timer-btns button.start.active { background:var(--red); color:#fff; border-color:var(--red); }

.section-title {
  font-size:14px;
  font-weight:600;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:6px;
  color:var(--text);
}

/* ===== QUIZ ===== */
.quiz-card {
  background:var(--card);
  border-radius:14px;
  border:1px solid var(--border);
  padding:20px;
}
.quiz-subject {
  display:flex;
  gap:6px;
  margin-bottom:12px;
}
.quiz-subject span {
  font-size:11px;
  padding:3px 12px;
  border-radius:10px;
}
.quiz-subject .s { background:var(--blue-bg); color:var(--blue); }
.quiz-subject .t { background:var(--gold-bg); color:var(--gold); }

.quiz-q {
  font-size:15px;
  line-height:1.7;
  padding:14px;
  background:rgba(255,255,255,0.02);
  border-radius:10px;
  border-left:3px solid var(--blue);
  margin-bottom:16px;
}

.quiz-opts { display:flex; flex-direction:column; gap:8px; }
.quiz-opt {
  padding:14px 16px;
  border:1px solid var(--border);
  border-radius:12px;
  background:transparent;
  color:var(--text);
  font-size:14px;
  text-align:left;
  font-family:inherit;
  cursor:pointer;
  transition:all 0.2s;
}
.quiz-opt:active { background:var(--blue-bg); }
.quiz-opt.correct {
  border-color:var(--green);
  background:var(--green-bg);
  color:var(--green);
}
.quiz-opt.wrong {
  border-color:var(--red);
  background:var(--red-bg);
  color:var(--red);
}

.quiz-exp {
  margin-top:14px;
  padding:14px;
  background:var(--blue-bg);
  border-radius:10px;
  font-size:13px;
  line-height:1.7;
  color:var(--text2);
  display:none;
}
.quiz-exp.show { display:block; }
.quiz-exp strong { color:var(--blue); }

.quiz-foot {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:16px;
}
.quiz-score { font-size:12px; color:var(--text3); }
.quiz-next {
  background:var(--blue);
  color:#fff;
  border:none;
  padding:10px 24px;
  border-radius:12px;
  font-size:14px;
  font-family:inherit;
  cursor:pointer;
  font-weight:500;
}

/* ===== KNOWLEDGE MAP ===== */
.km-subject {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:8px;
}
.km-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 16px;
  cursor:pointer;
}
.km-name {
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  font-weight:500;
}
.km-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.km-progress {
  display:flex;
  align-items:center;
  gap:8px;
}
.km-bar {
  width:80px;
  height:6px;
  background:var(--bg);
  border-radius:3px;
  overflow:hidden;
}
.km-fill { height:100%; border-radius:3px; transition:width 0.4s; }
.km-pct { font-size:11px; color:var(--text2); min-width:30px; text-align:right; }

.km-body { display:none; padding:4px 16px 14px; border-top:1px solid var(--border); }
.km-body.open { display:block; }

.km-chapter {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.03);
  font-size:13px;
}
.km-chapter:last-child { border-bottom:none; }
.km-chapter .name { color:var(--text2); flex:1; }
.km-chapter .btns { display:flex; gap:4px; flex-shrink:0; }
.km-chapter .btns button {
  width:30px; height:30px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  cursor:pointer;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text3);
}
.km-chapter .btns button.active { background:var(--green-bg); border-color:var(--green); color:var(--green); }
.km-chapter .btns button.learning { background:var(--blue-bg); border-color:var(--blue); color:var(--blue); }

/* ===== NOTEBOOK ===== */
.nb-form {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
}
.nb-form input, .nb-form textarea {
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 14px;
  color:var(--text);
  font-size:14px;
  font-family:inherit;
  outline:none;
  margin-bottom:10px;
}
.nb-form textarea {
  min-height:80px;
  resize:vertical;
}
.nb-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.nb-tag {
  padding:5px 12px;
  border-radius:14px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text2);
  font-size:12px;
  font-family:inherit;
  cursor:pointer;
}
.nb-tag.active { background:var(--purple-bg); border-color:var(--purple); color:var(--purple); }
.nb-submit {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:var(--purple);
  color:#fff;
  font-size:15px;
  font-weight:600;
  font-family:inherit;
  cursor:pointer;
}

.nb-list { display:flex; flex-direction:column; gap:8px; }
.nb-item {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
}
.nb-item-top {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:4px;
}
.nb-item-title { font-weight:600; font-size:14px; }
.nb-item-date { font-size:11px; color:var(--text3); flex-shrink:0; margin-left:8px; }
.nb-item-body { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:6px; }
.nb-item-tags { display:flex; gap:4px; flex-wrap:wrap; }
.nb-item-tag {
  font-size:10px;
  padding:2px 8px;
  border-radius:8px;
  background:var(--purple-bg);
  color:var(--purple);
}
.nb-item-del {
  margin-top:8px;
  background:none;
  border:none;
  color:var(--text3);
  font-size:12px;
  font-family:inherit;
  cursor:pointer;
  padding:4px 8px;
  border-radius:6px;
}
.nb-item-del:active { background:var(--red-bg); color:var(--red); }

/* ===== PROFILE ===== */
.profile-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  text-align:center;
  margin-bottom:12px;
}
.profile-card .avatar {
  width:60px; height:60px;
  border-radius:50%;
  background:var(--gold-bg);
  color:var(--gold);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  margin:0 auto 12px;
}
.profile-card .name { font-size:18px; font-weight:600; }
.profile-card .since { font-size:12px; color:var(--text3); margin-top:4px; }

.profile-stats {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:12px;
}
.ps-item {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  text-align:center;
}
.ps-item .v { font-size:24px; font-weight:700; }
.ps-item .l { font-size:11px; color:var(--text3); margin-top:2px; }

.profile-actions button {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-size:15px;
  font-family:inherit;
  cursor:pointer;
  margin-bottom:8px;
  text-align:left;
}
.profile-actions button:active { background:var(--bg2); }

/* ===== EMPTY STATE ===== */
.empty {
  text-align:center;
  padding:40px 20px;
  color:var(--text3);
  font-size:13px;
}

/* ===== TOAST ===== */
.toast {
  position:fixed;
  bottom:calc(var(--tab-h) + var(--safe-bottom) + 16px);
  left:16px;
  right:16px;
  padding:14px 20px;
  border-radius:12px;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
  font-size:14px;
  z-index:999;
  transform:translateY(200%);
  transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
  text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.toast.show { transform:translateY(0); }

/* ===== PULL TO REFRESH animation ===== */
@keyframes spin {
  from { transform:rotate(0deg); }
  to { transform:rotate(360deg); }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>CPA 学习</h1>
    <p class="sub">地方AMC · 证券IT老兵 · CPA之路</p>
    <div class="ver" id="loginVer">v1.2.0</div>
    <input id="loginInput" placeholder="输入你的名字" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">开始学习 →</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="app">
  <div class="app-header">
    <div>
      <span class="title">CPA 学习</span><span class="ver">v1.2.0</span>
    </div>
    <div class="right">
      <span class="user" id="headerUser"></span>
      <button class="logout" onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="page-area" id="pageArea">

    <!-- PAGE: 学习 -->
    <div class="page active" id="pageStudy">
      <div class="stats-grid">
        <div class="stat-item gold">
          <div class="label">累计学习</div>
          <div class="value" id="sHours">0</div>
          <div class="sub">小时</div>
        </div>
        <div class="stat-item blue">
          <div class="label">正确率</div>
          <div class="value" id="sAccuracy">0%</div>
          <div class="sub" id="sQuizCount">共0题</div>
        </div>
        <div class="stat-item green">
          <div class="label">知识点</div>
          <div class="value" id="sKnowledgePct">0%</div>
          <div class="sub" id="sKnowledgeCount">0/0</div>
        </div>
        <div class="stat-item purple">
          <div class="label">笔记</div>
          <div class="value" id="sNoteCount">0</div>
          <div class="sub">条记录</div>
        </div>
      </div>

      <div class="checkin-section">
        <div class="checkin-top">
          <div class="streak">
            <span>🔥</span>
            <span>连续</span>
            <span class="num" id="streakNum">0</span>
            <span>天</span>
          </div>
          <div style="font-size:12px;color:var(--text3)" id="dateDisplay"></div>
        </div>
        <button class="checkin-btn" id="checkinBtn" onclick="doCheckin()">📅 今日打卡</button>
        <div class="week-row" id="weekRow"></div>
      </div>

      <div class="section-title">⏱️ 学习计时</div>
      <div class="timer-section">
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div class="timer-btns">
          <button class="start" id="timerBtn" onclick="toggleTimer()">▶ 开始</button>
          <button onclick="resetTimer()">↺ 重置</button>
        </div>
      </div>
    </div>

    <!-- PAGE: 答题 -->
    <div class="page" id="pageQuiz">
      <div class="section-title">⚡ 每日快问快答</div>
      <div class="quiz-card" id="quizContainer"></div>
    </div>

    <!-- PAGE: 知识 -->
    <div class="page" id="pageKnowledge">
      <div class="section-title">🗺️ 知识地图</div>
      <div id="kmContainer"></div>
    </div>

    <!-- PAGE: 笔记 -->
    <div class="page" id="pageNotes">
      <div class="section-title">📓 业务问题笔记本</div>
      <div class="nb-form">
        <input id="noteTitle" placeholder="问题标题...">
        <textarea id="noteBody" placeholder="详细描述问题或心得..."></textarea>
        <div class="nb-tags" id="noteTags">
          <button class="nb-tag" data-tag="会计" onclick="toggleTag(this)">会计</button>
          <button class="nb-tag" data-tag="不良资产" onclick="toggleTag(this)">不良资产</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
var APP_VERSION = 'v1.2.0';

function getStorageKey() {
  var u = localStorage.getItem('cpa_user');
  return 'cpa_' + (u || 'default');
}

function getCurrentUser() {
  return localStorage.getItem('cpa_user') || '';
}

// ===== LOGIN =====
function doLogin() {
  var name = document.getElementById('loginInput').value.trim();
  if (!name) { alert('请输入名字'); return; }
  localStorage.setItem('cpa_user', name);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  document.getElementById('headerUser').textContent = '👤 ' + name;
  appData = loadData();
  init();
}

function doLogout() {
  if (confirm('退出后隐藏本用户数据？')) {
    localStorage.removeItem('cpa_user');
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginInput').value = '';
    document.getElementById('loginInput').focus();
  }
}

// ===== DATA =====
var defaultData = {
  checkins: [],
  streak: 0,
  totalMinutes: 0,
  quizStats: { total: 0, correct: 0 },
  knowledgeStatus: {},
  notes: [],
  timerRunning: false,
  timerStart: null,
  timerAccumulated: 0,
  createdDate: todayStr()
};

var appData = null;

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

function loadData() {
  try {
    var raw = localStorage.getItem(getStorageKey());
    if (raw) {
      var p = JSON.parse(raw);
      var r = deepClone(defaultData);
      for (var k in p) { r[k] = p[k]; }
      return r;
    }
  } catch(e) {}
  return deepClone(defaultData);
}

function saveData() {
  localStorage.setItem(getStorageKey(), JSON.stringify(appData));
}

// ===== HELPERS =====
function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDate(ds) {
  var p = ds.split('-');
  return parseInt(p[1]) + '月' + parseInt(p[2]) + '日';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

// ===== TAB SWITCH =====
function switchPage(pageId, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('pageArea').scrollTop = 0;

  if (pageId === 'pageQuiz') { loadNewQuiz(); }
  if (pageId === 'pageKnowledge') { renderKnowledgeMap(); }
  if (pageId === 'pageNotes') { renderNotes(); }
  if (pageId === 'pageProfile') { renderProfile(); }
  if (pageId === 'pageStudy') { updateStats(); }
}

// ===== DATE =====
function updateDate() {
  var now = new Date();
  var days = ['日','一','二','三','四','五','六'];
  document.getElementById('dateDisplay').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 周' + days[now.getDay()];
}

// ===== CHECKIN =====
function renderCheckin() {
  var today = todayStr();
  var checked = appData.checkins.indexOf(today) !== -1;
  var btn = document.getElementById('checkinBtn');

  if (checked) {
    btn.textContent = '✅ 今日已打卡';
    btn.classList.add('checked');
    btn.disabled = true;
  } else {
    btn.textContent = '📅 今日打卡';
    btn.classList.remove('checked');
    btn.disabled = false;
  }

  document.getElementById('streakNum').textContent = appData.streak;

  var weekRow = document.getElementById('weekRow');
  var labels = ['一','二','三','四','五','六','日'];
  var now = new Date();
  var dow = now.getDay() === 0 ? 6 : now.getDay() - 1;
  var html = '';
  for (var i = 0; i < 7; i++) {
    var d = new Date(now);
    d.setDate(d.getDate() - dow + i);
    var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    var cls = 'week-dot';
    if (appData.checkins.indexOf(ds) !== -1) cls += ' checked';
    if (ds === today) cls += ' active';
    html += '<div class="' + cls + '">' + labels[i] + '</div>';
  }
  weekRow.innerHTML = html;
}

function doCheckin() {
  var today = todayStr();
  if (appData.checkins.indexOf(today) !== -1) return;

  appData.checkins.push(today);
  var streak = 1;
  var d = new Date();
  d.setDate(d.getDate() - 1);
  while (true) {
    var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if (appData.checkins.indexOf(ds) !== -1) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  appData.streak = streak;
  saveData();
  renderCheckin();
  updateStats();
  showToast('🔥 打卡成功！连续 ' + streak + ' 天');
}

// ===== TIMER =====
var timerInterval = null;

function toggleTimer() {
  if (appData.timerRunning) {
    clearInterval(timerInterval);
    var elapsed = Math.floor((Date.now() - appData.timerStart) / 60000);
    appData.totalMinutes += elapsed;
    appData.timerAccumulated += elapsed * 60;
    appData.timerRunning = false;
    appData.timerStart = null;
    saveData();
    document.getElementById('timerBtn').textContent = '▶ 开始';
    document.getElementById('timerBtn').classList.remove('active');
    updateTimerDisplay();
    updateStats();
    showToast('学习了 ' + elapsed + ' 分钟 👍');
  } else {
    appData.timerRunning = true;
    appData.timerStart = Date.now();
    saveData();
    document.getElementById('timerBtn').textContent = '⏹ 停止';
    document.getElementById('timerBtn').classList.add('active');
    clearInterval(timerInterval);
    timerInterval = setInterval(updateTimerDisplay, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  if (appData.timerRunning && appData.timerStart) {
    var elapsed = Math.floor((Date.now() - appData.timerStart) / 60000);
    appData.totalMinutes += elapsed;
  }
  appData.timerRunning = false;
  appData.timerStart = null;
  appData.timerAccumulated = 0;
  saveData();
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('timerBtn').textContent = '▶ 开始';
  document.getElementById('timerBtn').classList.remove('active');
  updateStats();
}

function updateTimerDisplay() {
  var totalSec = appData.timerAccumulated || 0;
  if (appData.timerRunning && appData.timerStart) {
    totalSec += Math.floor((Date.now() - appData.timerStart) / 1000);
  }
  var m = Math.floor(totalSec / 60);
  var s = totalSec % 60;
  document.getElementById('timerDisplay').textContent =
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ===== QUIZ =====
var quizBank = [
  { id:1, subject:'会计', topic:'会计基本假设', q:'以下哪项不属于会计基本假设？', opts:['会计主体','持续经营','权责发生制','货币计量'], ans:2, exp:'<strong>会计基本假设</strong>包括四项：会计主体、持续经营、会计分期、货币计量。权责发生制是<strong>会计基础</strong>。' },
  { id:2, subject:'会计', topic:'金融资产分类', q:'AMC以1000万元收购不良债权包，合同约定固定回收，应分类为？', opts:['FVTPL','FVTOCI','摊余成本计量','长期股权投资'], ans:2, exp:'该债权包通过SPPI测试，如业务模式为持有至到期，应分类为<strong>以摊余成本计量</strong>。' },
  { id:3, subject:'会计', topic:'资产减值', q:'不良债权资产何时计提减值？', opts:['债务人破产时','有客观减值证据时','年末统一计提','不需要'], ans:1, exp:'根据<strong>预期信用损失模型</strong>，应在每个资产负债表日评估信用风险，计提预期信用损失。' },
  { id:4, subject:'会计', topic:'新租赁准则', q:'新租赁准则下，承租人融资租赁的会计处理是？', opts:['表外只确认费用','使用权资产+租赁负债','区分融资/经营租赁','只附注披露'], ans:1, exp:'新租赁准则<strong>不再区分融资/经营租赁</strong>，统一确认使用权资产和租赁负债。' },
  { id:5, subject:'会计', topic:'收入确认', q:'商业保理手续费收入应在何时确认？', opts:['签合同时一次确认','保理期间分期确认','收到款项时','客户违约时'], ans:1, exp:'保理手续费是服务对价，应在<strong>保理期间分期确认</strong>。' },
  { id:6, subject:'会计', topic:'实质重于形式', q:'以下哪个体现"实质重于形式"？', opts:['按发票入账','售后回租确认为融资','固定资产按历史成本','按月编报表'], ans:1, exp:'售后回租虽然法律形式是销售，经济实质是<strong>融资</strong>，应确认为融资行为。' },
  { id:7, subject:'经济法', topic:'破产法', q:'AMC作为债权人，对管理人审查的债权有异议应如何？', opts:['必须接受','提起诉讼','向上级申诉','自行核销'], ans:1, exp:'根据《破产法》第58条，可向法院提起<strong>债权确认诉讼</strong>。' },
  { id:8, subject:'税法', topic:'不良资产增值税', q:'AMC转让不良债权差额应缴什么税？', opts:['增值税6%','增值税3%简易','不缴增值税','企业所得税'], ans:1, exp:'金融商品转让适用<strong>差额计税</strong>，AMC处置不良资产适用简易计税3%。' },
  { id:9, subject:'财管', topic:'NPV', q:'评估不良资产包是否值得收购，哪个指标最关键？', opts:['账面原值','净现值(NPV)','资产户数','出让方'], ans:1, exp:'NPV = 未来现金流现值 - 收购价格。NPV>0时投资可行。' },
  { id:10, subject:'会计', topic:'合并报表', q:'AMC设立SPV持有不良资产，何时需要合并？', opts:['永远不需要','AMC拥有控制权时','SPV亏损时','只在年报'], ans:1, exp:'合并报表核心是<strong>控制</strong>——权力、可变回报、运用权力影响回报。' },
  { id:11, subject:'会计', topic:'公允价值', q:'不良资产无活跃市场时，公允价值如何确定？', opts:['按账面价值','用估值技术','管理层随意定','按零值'], ans:1, exp:'使用<strong>估值技术</strong>（收益法/市场法/成本法），属于第三层次公允价值。' },
  { id:12, subject:'审计', topic:'审计意见', q:'年报被出具"保留意见"意味着什么？', opts:['完全没问题','存在重大错报但不广泛','即将破产','审计师拒绝'], ans:1, exp:'保留意见：存在重大错报但<strong>影响不广泛</strong>。' }
];

var currentQuiz = null;
var quizAnswered = false;

function shuffle(arr) {
  for (var i = arr.length-1; i>0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

function loadNewQuiz() {
  quizAnswered = false;
  currentQuiz = quizBank[Math.floor(Math.random() * quizBank.length)];
  renderQuiz();
}

function renderQuiz() {
  var q = currentQuiz;
  var optsHtml = '';
  for (var i = 0; i < q.opts.length; i++) {
    optsHtml += '<button class="quiz-opt" onclick="answerQuiz('+i+')" id="qo'+i+'">'+
      '<strong>'+'ABCD'[i]+'.</strong> '+q.opts[i]+'</button>';
  }
  document.getElementById('quizContainer').innerHTML =
    '<div class="quiz-subject"><span class="s">'+q.subject+'</span><span class="t">'+q.topic+'</span></div>'+
    '<div class="quiz-q">'+q.q+'</div>'+
    '<div class="quiz-opts">'+optsHtml+'</div>'+
    '<div class="quiz-exp" id="quizExp">'+q.exp+'</div>'+
    '<div class="quiz-foot"><div class="quiz-score" id="quizScore">正确 '+appData.quizStats.correct+'/'+appData.quizStats.total+'</div>'+
    '<button class="quiz-next" onclick="loadNewQuiz()">下一题 →</button></div>';
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  var q = currentQuiz;
  appData.quizStats.total++;
  document.getElementById('qo'+idx).classList.add(idx===q.ans ? 'correct' : 'wrong');
  if (idx !== q.ans) document.getElementById('qo'+q.ans).classList.add('correct');
  else appData.quizStats.correct++;
  document.getElementById('quizExp').classList.add('show');
  document.getElementById('quizScore').textContent = '正确 '+appData.quizStats.correct+'/'+appData.quizStats.total;
  saveData();
  updateStats();
}

// ===== KNOWLEDGE MAP =====
var kmData = [
  { name:'会计', color:'#3b82f6', chapters:[
    '总论','会计要素','金融资产','存货','长期股权投资','固定资产','无形资产','投资性房地产',
    '资产减值','负债','所有者权益','收入费用利润','财务报告','租赁','持有待售','债务重组','外币折算','会计政策变更','日后事项','合并报表'
  ]},
  { name:'审计', color:'#8b5cf6', chapters:['审计概述','审计计划','审计证据','风险评估','风险应对','审计抽样','审计报告','内部控制']},
  { name:'税法', color:'#10b981', chapters:['增值税','消费税','企业所得税','个人所得税','土地增值税','房产税','印花税','税收征管']},
  { name:'经济法', color:'#f97316', chapters:['民法合同法','公司法','证券法','破产法','票据法','物权法']},
  { name:'财管', color:'#ef4444', chapters:['财务管理概述','财务报表分析','价值评估','资本预算','资本成本','杠杆','营运资本管理','本量利分析']},
  { name:'战略', color:'#f0b429', chapters:['战略分析','战略选择','战略实施','风险管理','公司治理']}
];

function renderKnowledgeMap() {
  var container = document.getElementById('kmContainer');
  var totalCh = 0, learnedCh = 0;
  var html = '';
  for (var si = 0; si < kmData.length; si++) {
    var s = kmData[si];
    var sk = 's'+si;
    var done = 0, learning = 0;
    for (var ci = 0; ci < s.chapters.length; ci++) {
      var st = appData.knowledgeStatus[sk+'_c'+ci];
      if (st === 'done') done++;
      else if (st === 'learning') learning++;
    }
    totalCh += s.chapters.length;
    learnedCh += done;
    var pct = Math.round(((done + learning*0.5)/s.chapters.length)*100);

    html += '<div class="km-subject">'+
      '<div class="km-header" onclick="toggleKM(\'kmb'+si+'\')">'+
        '<div class="km-name"><div class="km-dot" style="background:'+s.color+'"></div>'+s.name+'</div>'+
        '<div class="km-progress"><div class="km-bar"><div class="km-fill" style="width:'+pct+'%;background:'+s.color+'"></div></div>'+
        '<span class="km-pct">'+pct+'%</span></div></div>'+
      '<div class="km-body" id="kmb'+si+'">';

    for (var ci = 0; ci < s.chapters.length; ci++) {
      var st = appData.knowledgeStatus[sk+'_c'+ci] || '';
      html += '<div class="km-chapter">'+
        '<span class="name">'+s.chapters[ci]+'</span>'+
        '<div class="btns">'+
          '<button class="'+(st==='learning'?'learning':'')+'" onclick="setKS(\''+sk+'_c'+ci+'\',\'learning\',this)">📖</button>'+
          '<button class="'+(st==='done'?'active':'')+'" onclick="setKS(\''+sk+'_c'+ci+'\',\'done\',this)">✅</button></div></div>';
    }
    html += '</div></div>';
  }
  container.innerHTML = html;

  var pct = totalCh > 0 ? Math.round((learnedCh/totalCh)*100) : 0;
  document.getElementById('sKnowledgePct').textContent = pct+'%';
  document.getElementById('sKnowledgeCount').textContent = learnedCh+'/'+totalCh;
}

function toggleKM(id) { document.getElementById(id).classList.toggle('open'); }

function setKS(key, status, btn) {
  if (appData.knowledgeStatus[key] === status) delete appData.knowledgeStatus[key];
  else appData.knowledgeStatus[key] = status;
  saveData();
  renderKnowledgeMap();
  updateStats();
}

// ===== NOTES =====
function toggleTag(btn) { btn.classList.toggle('active'); }

function addNote() {
  var title = document.getElementById('noteTitle').value.trim();
  var body = document.getElementById('noteBody').value.trim();
  if (!title) { showToast('请输入问题标题'); return; }
  if (!body) { showToast('请输入详细描述'); return; }
  var tags = [];
  document.querySelectorAll('#noteTags .nb-tag.active').forEach(function(b){ tags.push(b.dataset.tag); });
  appData.notes.unshift({ id:Date.now(), title:title, body:body, tags:tags, date:todayStr() });
  saveData();
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteBody').value = '';
  document.querySelectorAll('#noteTags .nb-tag').forEach(function(b){ b.classList.remove('active'); });
  renderNotes();
  updateStats();
  showToast('📝 笔记已保存');
}

function deleteNote(id) {
  appData.notes = appData.notes.filter(function(n){ return n.id !== id; });
  saveData();
  renderNotes();
  updateStats();
}

function renderNotes() {
  var list = document.getElementById('noteList');
  if (appData.notes.length === 0) {
    list.innerHTML = '<div class="empty">还没有笔记 📝<br>记录你的第一个业务问题吧</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < appData.notes.length; i++) {
    var n = appData.notes[i];
    var th = '';
    if (n.tags.length) {
      th = '<div class="nb-item-tags">';
      for (var j = 0; j < n.tags.length; j++) th += '<span class="nb-item-tag">'+n.tags[j]+'</span>';
      th += '</div>';
    }
    html += '<div class="nb-item">'+
      '<div class="nb-item-top"><span class="nb-item-title">'+n.title+'</span><span class="nb-item-date">'+formatDate(n.date)+'</span></div>'+
      '<div class="nb-item-body">'+n.body+'</div>'+th+
      '<button class="nb-item-del" onclick="deleteNote('+n.id+')">删除</button></div>';
  }
  list.innerHTML = html;
}

function exportNotes() {
  if (!appData.notes.length) { showToast('没有笔记可导出'); return; }
  var text = 'CPA学习笔记 - 导出时间: '+new Date().toLocaleString()+'\n\n';
  for (var i = 0; i < appData.notes.length; i++) {
    var n = appData.notes[i];
    text += '【'+(i+1)+'】'+n.title+'\n日期: '+formatDate(n.date)+'\n';
    if (n.tags.length) text += '标签: '+n.tags.join(',')+'\n';
    text += '\n'+n.body+'\n\n---\n\n';
  }
  var blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'CPA笔记_'+todayStr()+'.txt'; a.click();
  URL.revokeObjectURL(blob);
  showToast('📄 笔记已导出');
}

// ===== PROFILE =====
function renderProfile() {
  var user = getCurrentUser();
  document.getElementById('pName').textContent = user;

  var created = appData.createdDate;
  document.getElementById('pSince').textContent = '始于 ' + formatDate(created) + '，已坚持 ' + appData.checkins.length + ' 天';

  var hours = (appData.totalMinutes/60).toFixed(1);
  document.getElementById('pHours').textContent = hours;

  var acc = appData.quizStats.total > 0 ? Math.round((appData.quizStats.correct/appData.quizStats.total)*100) : 0;
  document.getElementById('pAccuracy').textContent = acc+'%';
  document.getElementById('pQuizCount').textContent = '共'+appData.quizStats.total+'题';

  var totalCh = 0, learnedCh = 0;
  for (var si = 0; si < kmData.length; si++) {
    var sk = 's'+si;
    for (var ci = 0; ci < kmData[si].chapters.length; ci++) {
      totalCh++;
      if (appData.knowledgeStatus[sk+'_c'+ci] === 'done') learnedCh++;
    }
  }
  document.getElementById('pKnowledgePct').textContent = totalCh>0?Math.round(learnedCh/totalCh*100)+'%':'0%';
  document.getElementById('pKnowledgeCount').textContent = learnedCh+'/'+totalCh;
  document.getElementById('pNoteCount').textContent = appData.notes.length;
}

// ===== STATS =====
function updateStats() {
  var hours = (appData.totalMinutes/60).toFixed(1);
  document.getElementById('sHours').textContent = hours;

  var acc = appData.quizStats.total > 0 ? Math.round((appData.quizStats.correct/appData.quizStats.total)*100) : 0;
  document.getElementById('sAccuracy').textContent = acc+'%';
  document.getElementById('sQuizCount').textContent = '共'+appData.quizStats.total+'题';

  document.getElementById('sNoteCount').textContent = appData.notes.length;
  renderCheckin();
}

// ===== INIT =====
function init() {
  updateDate();
  renderCheckin();
  updateTimerDisplay();
  updateStats();
  renderKnowledgeMap();
  renderNotes();
  renderProfile();

  if (appData.timerRunning && appData.timerStart) {
    timerInterval = setInterval(updateTimerDisplay, 1000);
    document.getElementById('timerBtn').textContent = '⏹ 停止';
    document.getElementById('timerBtn').classList.add('active');
  }
}

// ===== STARTUP =====
(function(){
  var user = getCurrentUser();
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app').style.flexDirection = 'column';
    document.getElementById('headerUser').textContent = '👤 ' + user;
    appData = loadData();
    init();
  }
})();
</script>
